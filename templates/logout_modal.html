<!-- LOGOUT MODAL -->
<div id="logoutModal" class="modal">
    <div class="modal-box">
        <h2>Logout</h2>
        <p>Are you sure you want to log out?</p>

        <div class="modal-actions">
            <button onclick="closeLogoutModal()" class="btn cancel">Cancel</button>
            <button onclick="confirmLogout()" class="btn logout">Logout</button>
        </div>
    </div>
</div>
<style>
    /* MODAL BACKGROUND */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    
    background: rgba(0, 0, 0, 0.4);
    justify-content: center;
    align-items: center;
}

/* MODAL BOX */
.modal-box {
    background: #fff;
    padding: 25px 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;

    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    animation: fadeIn 0.2s ease-in-out;
}

/* TEXT */
.modal-box h2 {
    margin-bottom: 10px;
}

.modal-box p {
    color: #555;
    margin-bottom: 20px;
}

/* BUTTONS */
.modal-actions {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* CANCEL BUTTON */
.btn.cancel {
    background: #e0e0e0;
    color: #333;
}

.btn.cancel:hover {
    background: #cfcfcf;
}

/* LOGOUT BUTTON */
.btn.logout {
    background: #ff4d4d;
    color: white;
}

.btn.logout:hover {
    background: #e60000;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        transform: scale(0.9);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

</style>
<script>
function openLogoutModal() {
    document.getElementById("logoutModal").style.display = "flex";
}

function closeLogoutModal() {
    document.getElementById("logoutModal").style.display = "none";
}

function confirmLogout() {
    window.location.href = "/logout";
}

// click outside = close
window.onclick = function(event) {
    let modal = document.getElementById("logoutModal");
    if (event.target === modal) {
        closeLogoutModal();
    }
}
</script>
