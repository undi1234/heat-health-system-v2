<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- CONNECT CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-page">
<div class="frame">

    <div class="icon">
        <span>🌡️</span>
    </div>

    <h2>HEAT HEALTH MONITORING SYSTEM</h2>
    <p class="subtitle">Barangay Temperature & Heat Index Monitoring</p>

    <!-- ✅ FORM CONNECTED -->
    <form action="/login" method="POST">

        <div class="input-field">
            <label>Username</label>
            <input type="text" name="username"
                value="{{ username or '' }}"
                class="{% if username_error %}input-error{% endif %}"
                required>

            {% if username_error %}
                <small class="error-text">{{ username_error }}</small>
            {% endif %}
        </div>

        <div class="input-field">
            <label>Password</label>
            <input type="password" name="password"
                class="{% if password_error %}input-error{% endif %}"
                required>

            {% if password_error %}
                <small class="error-text">{{ password_error }}</small>
            {% endif %}
        </div>

        <button type="submit" class="btn">Login</button>

    </form>

    <div class="register-box" onclick="goRegister()">Register Account</div>

</div>   

<script>
function goRegister(){
    window.location.href = "/register_page";
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const inputs = document.querySelectorAll("input");
    const flashMessages = document.querySelectorAll(".flash");

    inputs.forEach(input => {
        input.addEventListener("input", () => {
            flashMessages.forEach(msg => {
                msg.style.display = "none";
            });
        });
    });

    setTimeout(() => {
        document.querySelectorAll(".flash").forEach(msg => {
            msg.style.display = "none";
        });
    }, 3000);
});
</script>


</body>
</html>
